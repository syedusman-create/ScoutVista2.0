name: coach_ai_v2
description: "A modern Flutter fitness app with AI-powered pose detection and form analysis."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Core Flutter
  cupertino_icons: ^1.0.8
  
  # Firebase - Latest versions
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3
  
  # UI & Design - Latest versions
  google_fonts: ^6.3.2
  carousel_slider: ^5.1.1
  font_awesome_flutter: ^10.10.0
  curved_navigation_bar: ^1.0.6
  lottie: ^3.3.2
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # Video & Media - Latest versions with namespace support
  file_picker: ^8.0.0+1
  video_player: ^2.8.2
  image: ^4.5.4
  image_picker: ^1.2.0
  
  # Utilities
  sensors_plus: ^7.0.0
  fluttertoast: ^9.0.0
  flutter_tts: ^4.2.3
  path_provider: ^2.1.5
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Pose detection (on-device, no bundled TFLite assets)
  google_mlkit_pose_detection: ^0.11.0
  
  # State Management
  provider: ^6.1.2
  video_thumbnail: ^0.5.6
  
  # Charts and Visualization
  fl_chart: ^0.69.0
  
  # Calendar
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon-v2.png"
  min_sdk_android: 21
  size: 128

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/